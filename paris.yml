        iteration_id: '1776930523021'
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: gemini-3.1-flash-lite-preview
          provider: langgenius/gemini/google
        prompt_template:
        - id: 1fe3f747-e62e-403e-ac76-4aa60da5814b
          role: system
          text: "You will see:\n\n[Exhibit Information]\nName: {{{{#1776885893947.name#}}}}\n\
            Context: {{{{#1776885893947.context#}}}}\n\n[Current Text Chunk]\n{{{{#1776930523021.item#}}}}\n\
            \nTask:\nDetermine the relationship between the current text chunk and\
            \ the exhibit, and extract relevant information only when supported by\
            \ evidence.\n\n---\n\nMatch Levels:\n\n- exact: The text clearly refers\
            \ to this specific exhibit (explicit name or uniquely identifiable reference)\n\
            - related: The text does not explicitly name the exhibit but clearly belongs\
            \ to the same country, section, category, manufacturing system, or object\
            \ group, and can serve as contextual/background information\n- none: The\
            \ text has no clear relation to the exhibit\n\n---\n\nField Types:\n\n\
            [Objective Information]\n- Manufacturing Process: how something is made\
            \ or produced\n- Structural Feature: physical structure or composition\n\
            - Category Context: industry or category it belongs to\n\n[Exhibition\
            \ Context]\n- Exhibition Context: information about country, section,\
            \ or exhibition setting\n\n[Subjective Perception]\n- Audience Impression:\
            \ expressed feelings or impressions (e.g., ingenious, curious)\n- Evaluation:\
            \ explicit judgment (e.g., beautiful, poor quality)\n- Popularity: level\
            \ of attention, interest, or public engagement\n\n---\n\nOutput Requirements:\n\
            \nOnly output valid JSON:\n\n{\n  \"match_level\": \"exact | related |\
            \ none\",\n  \"fields\": [\n    {\n      \"field\": \"...\",\n      \"\
            value\": \"...\",\n      \"evidence\": \"...\",\n      \"confidence\"\
            : 0.0\n    }\n  ]\n}\n\n---\n\nStrict Rules:\n\n[Judgment]\n- Only use\
            \ the current text chunk; do NOT use information from other chunks\n-\
            \ If the text only describes general industry, manufacturing, or national\
            \ background → usually \"related\"\n- If no clear relation → return \"\
            none\" with empty fields\n\n[Value Writing — Critical]\n- Write the extracted\
            \ information directly (NOT meta descriptions)\n- DO NOT write phrases\
            \ like:\n  \"the text describes...\", \"the passage mentions...\", \"\
            this section talks about...\"\n- Use ONE concise sentence (preferably\
            \ 8–25 words)\n- Preferred structure:\n  object + feature/action\n- Must\
            \ contain concrete information (object / process / feature)\n- Avoid vague\
            \ wording (e.g., \"some information\", \"general content\")\n\n[Granularity]\n\
            - If multiple clear information points exist, output multiple fields\n\
            - Each field should contain only ONE distinct information point\n\n[Subjective\
            \ Information]\n- Only extract if explicit evaluative or emotional language\
            \ appears in the text\n- Evidence MUST include the actual evaluative words\
            \ (e.g., \"ingenious\", \"beautiful\", \"curious\")\n- Do NOT infer or\
            \ assume sentiment\n\n[Evidence]\n- Must be copied verbatim from the current\
            \ text chunk\n- Keep it short and focused (key phrase only)\n\n[Confidence]\n\
            - 0–1 scale\n- Direct and explicit evidence: 0.8–1.0\n- Reasonable inference:\
            \ 0.5–0.8\n- Weak relation: 0.3–0.5\n\n[Forbidden]\n- Do NOT fabricate\
            \ information\n- Do NOT add anything not present in the text\n- Do NOT\
            \ output explanations\n- Output JSON only\n\n---\n\nStyle Example (for\
            \ reference only, do NOT copy):\n\n{\n  \"match_level\": \"related\",\n\
            \  \"fields\": [\n    {\n      \"field\": \"Manufacturing Process\",\n\
            \      \"value\": \"Needle-gun components require precise tube fitting\
            \ and are formed through cutting and rolling\",\n      \"evidence\": \"\
            requiring short tubes with indentations of great exactness ... roll it\
            \ up\",\n      \"confidence\": 0.9\n    },\n    {\n      \"field\": \"\
            Audience Impression\",\n      \"value\": \"Manufacturing machines are\
            \ described as highly ingenious and costly\",\n      \"evidence\": \"\
            very ingenious and expensive machines\",\n      \"confidence\": 0.88\n\
            \    }\n  ]\n}"
